<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Vermeil Quest</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <h1 class="title">Vermeil Quest</h1>
  <p class="subtitle">Academy Interface Online</p>

  <!-- PROFILE -->
  <div class="profile-card">

    <h2 id="name"></h2>
    <p>ID: <span id="id"></span></p>

    <p>Level: <span id="level"></span></p>

    <p>XP: <span id="xp"></span></p>

    <div class="xp-container">
      <div id="xpBar"></div>
    </div>

    <p>Streak: <span id="streak"></span> 🔥</p>

    <button onclick="addXP()">Complete Activity (+10 XP)</button>
  </div>

  <!-- CLASSES -->
  <h2>Classes</h2>

  <div class="class-grid">
    <div class="class-card" onclick="openLesson('https://cognate-elective-course-2.vercel.app/')">
      📘 COELE2
    </div>
  </div>

  <!-- DAILY QUEST SYSTEM -->
  <h2>Daily Quest</h2>

  <div class="class-grid">

    <button id="day1" onclick="claimDay(1)">Day 1</button>
    <button id="day2" onclick="claimDay(2)">Day 2</button>
    <button id="day3" onclick="claimDay(3)">Day 3</button>
    <button id="day4" onclick="claimDay(4)">Day 4</button>
    <button id="day5" onclick="claimDay(5)">Day 5</button>
    <button id="day6" onclick="claimDay(6)">Day 6</button>
    <button id="day7" onclick="claimDay(7)">Day 7</button>

  </div>

  <!-- STREAK SYSTEM -->
  <h2>Daily Streak</h2>

  <div class="streak-card" onclick="claimStreak()">
    <p>🔥 Claim Today’s Reward</p>
    <h3 id="streakStatus">Not claimed yet</h3>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
