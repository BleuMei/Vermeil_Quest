<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Vermeil Quest</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <h1 class="title">Vermeil Quest</h1>
  <p class="subtitle">Academy Interface Online</p>

  <!-- PROFILE -->
  <div class="profile-card">
    <h2 id="name"></h2>
    <p>ID: <span id="id"></span></p>
    <p>XP: <span id="xp"></span></p>
    <p>Streak: <span id="streak"></span> 🔥</p>

    <button onclick="addXP()">Complete Activity (+10 XP)</button>
  </div>

  <!-- CLASSES -->
  <h2>Classes</h2>

  <div class="class-grid">
    <div class="class-card" onclick="enterClass('CPE 101')">📘 CPE 101</div>
    <div class="class-card" onclick="enterClass('CPE 102')">📘 CPE 102</div>
    <div class="class-card" onclick="enterClass('Math for Engineers')">📘 Math for Engineers</div>
  </div>

  <div class="class-card" onclick="openLesson('https://cognate-elective-course-2.vercel.app/')">
  📘 COELE2
</div>

  <script src="dashboard.js"></script>
</body>
</html>
