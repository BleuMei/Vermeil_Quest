<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Vermeil Quest</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <h1 class="title">Vermeil Quest</h1>
  <p class="subtitle">Academy Interface Online</p>

  <!-- PROFILE -->
  <div class="profile-card">
    <h2 id="name"></h2>
    <p>ID: <span id="id"></span></p>
    <p>XP: <span id="xp"></span></p>
    <p>Streak: <span id="streak"></span> 🔥</p>

    <button onclick="addXP()">Complete Activity (+10 XP)</button>
  </div>

  <!-- CLASSES -->
  <h2>Classes</h2>

<div class="class-grid">
  <div class="class-card" onclick="openLesson('https://cognate-elective-course-2.vercel.app/')">
    📘 COELE2
  </div>
</div>

  <h2>Daily Quest</h2>

<div class="day-grid">
  <button onclick="claimDay(1)" id="day1">Day 1</button>
  <button onclick="claimDay(2)" id="day2">Day 2</button>
  <button onclick="claimDay(3)" id="day3">Day 3</button>
  <button onclick="claimDay(4)" id="day4">Day 4</button>
  <button onclick="claimDay(5)" id="day5">Day 5</button>
  <button onclick="claimDay(6)" id="day6">Day 6</button>
  <button onclick="claimDay(7)" id="day7">Day 7</button>
</div>

  <script src="dashboard.js"></script>
</body>
</html>
