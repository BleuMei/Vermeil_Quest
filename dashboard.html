<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Vermeil Quest</title>

  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

  <h1 class="title">Vermeil Quest</h1>
  <p class="subtitle">Academy Interface Online</p>

  <!-- PROFILE -->
  <div class="profile-card">
    <h2 id="name"></h2>
    <p>ID: <span id="id"></span></p>

    <p>Level: <span id="level"></span></p>

    <p>XP: <span id="xp"></span></p>

    <div class="xp-container">
      <div id="xpBar"></div>
    </div>

    <p>Streak: <span id="streak"></span> 🔥</p>

    <button onclick="addXP()">Complete Activity (+10 XP)</button>
  </div>

  <!-- CLASSES -->
  <h2>Classes</h2>

  <div class="class-grid">
    <div class="class-card" onclick="openLesson('https://cognate-elective-course-2.vercel.app/')">
      📘 COELE2
    </div>
  </div>

  <!-- DAILY QUEST POPUP TRIGGER -->
  <div id="dailyPopup" class="center-popup hidden"></div>

  <script src="dashboard.js"></script>
</body>
</html>
