<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vermeil Quest</title>

  <link rel="stylesheet" href="styles.css">

  <!-- FANTASY FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <!-- TITLE -->
  <h1 class="title">Vermeil Quest</h1>
  <p class="subtitle">Academy Interface Online</p>

  <!-- PROFILE -->
  <div class="profile-card">

    <h2 id="name"></h2>
    <p>ID: <span id="id"></span></p>

    <p>Level: <span id="level"></span></p>
    <p>XP: <span id="xp"></span></p>

    <!-- MANA XP BAR -->
    <div class="xp-container">
      <div id="xpBar" class="xp-bar"></div>
    </div>

    <p>Streak: <span id="streak"></span> 🔥</p>

  </div>

  <!-- CLASSES -->
  <h2>Classes</h2>

  <div class="class-grid">
    <div class="class-card" onclick="openLesson('https://cognate-elective-course-2.vercel.app/')">
      COELE2
    </div>
  </div>

  <!-- DAILY QUEST -->
  <h2>Daily Quest</h2>

  <!-- CLEAN GRID (FIXED) -->
  <div class="day-grid">
    <div class="day-box" id="day1" onclick="claimDay(1)">Day 1</div>
    <div class="day-box" id="day2" onclick="claimDay(2)">Day 2</div>
    <div class="day-box" id="day3" onclick="claimDay(3)">Day 3</div>
    <div class="day-box" id="day4" onclick="claimDay(4)">Day 4</div>
    <div class="day-box" id="day5" onclick="claimDay(5)">Day 5</div>
    <div class="day-box" id="day6" onclick="claimDay(6)">Day 6</div>
    <div class="day-box" id="day7" onclick="claimDay(7)">Day 7</div>
  </div>

  <!-- BURGER MENU -->
  <div class="burger" onclick="toggleMenu()">☰</div>

  <!-- SIDE MENU -->
  <div id="sideMenu" class="side-menu">
    <h3>Menu</h3>

    <button onclick="closeMenu(); window.location.reload()">Dashboard</button>
    <button onclick="alert('Achievements coming soon')">Achievements</button>
    <button onclick="alert('Inventory coming soon')">Inventory</button>
    <button onclick="logout()">Logout</button>
  </div>

  <!-- REWARD CHEST -->
  <div id="rewardChest" class="chest hidden" onclick="openChest()">
    🧰
  </div>

  <!-- LEVEL UP SCREEN -->
  <div id="levelUpScreen" class="level-up hidden"></div>

  <!-- MAIN SCRIPT ONLY (IMPORTANT) -->
  <script type="module" src="dashboard.js"></script>

</body>
</html>
