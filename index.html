<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vermeil Quest</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="center-card">
    <h1>Vermeil Quest</h1>
    <p class="subtitle">Enter the Academy</p>

    <!-- FIXED FORM (NO INLINE JS) -->
    <form id="loginForm">

      <input 
        id="studentId" 
        type="text" 
        placeholder="Student ID" 
        required
      >

      <br><br>

      <input 
        id="password" 
        type="password" 
        placeholder="Password (same as ID)" 
        required
      >

      <br><br>

      <button type="submit">Enter Quest</button>

    </form>
  </div>

  <script type="module" src="login.js"></script>

</body>
</html>
