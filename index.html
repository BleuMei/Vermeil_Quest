<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vermeil Quest</title>

  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="center-card">
    <h1>Vermeil Quest</h1>
    <p class="subtitle">Enter the Academy</p>

    <form id="loginForm">
      <input id="studentId" type="text" placeholder="Student ID" required>
      <br><br>

      <input id="password" type="password" placeholder="Password (same as ID)" required>
      <br><br>

      <button type="submit">Enter Quest</button>
    </form>
  </div>

  <script type="module" src="login.js"></script>

  <script>
    // this runs AFTER module loads safely
    window.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("loginForm");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const id = document.getElementById("studentId").value;
        const password = document.getElementById("password").value;

        const loginFn = window.login;
        if (!loginFn) {
          alert("Login function not loaded yet");
          return;
        }

        await loginFn(id, password);
      });
    });
  </script>

</body>
</html>
