<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vermeil Quest</title>

  <link rel="stylesheet" href="styles.css">

  <!-- Fantasy Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

  <div class="center-card">
    <h1>Vermeil Quest</h1>
    <p class="subtitle">Enter the Academy</p>

    <!-- FORM (clean + functional) -->
    <form onsubmit="login(); return false;">
      
      <!-- STUDENT ID -->
      <input 
        id="studentId" 
        type="text" 
        placeholder="Student ID" 
        required
      >

      <br><br>

      <!-- PASSWORD (same as ID for now) -->
      <input 
        id="password" 
        type="password" 
        placeholder="Password (same as ID)" 
        required
      >

      <br><br>

      <!-- SUBMIT -->
      <button type="submit">Enter Quest</button>

    </form>
  </div>

  <!-- IMPORTANT: must be module for Firebase -->
  <script type="module" src="login.js"></script>

</body>
</html>
